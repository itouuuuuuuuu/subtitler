name: Prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Target version (e.g., 0.1.1, 1.2.3). Defaults to next patch.'
        required: true
        default: '0.1.1'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set version
        id: bump
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -e
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: $VERSION (expected semver like 1.2.3)"
            exit 1
          fi
          npm --no-git-tag-version --allow-same-version version "$VERSION" > /dev/null
          node scripts/sync-version.mjs
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Set to v$VERSION"

      - name: Update default version for next run
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = '.github/workflows/prepare-release.yml';
          const [major, minor, patch] = process.env.VERSION.split('.').map((part) => Number(part.replace(/[^0-9].*$/, '')));
          const next = `${major}.${minor}.${patch + 1}`;
          const content = fs.readFileSync(path, 'utf8');
          const updated = content.replace(
            /(inputs:\s*\n\s*version:[\s\S]*?default:\s*)(['"])[^'"]*\2/,
            `$1$2${next}$2`
          );
          if (updated === content) {
            console.error('Failed to update default version in workflow file.');
            process.exit(1);
          }
          fs.writeFileSync(path, updated);
          console.log(`Default for next run set to ${next}`);
          NODE

      - name: Run tests on bumped tree
        run: npm test

      - name: Open release PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -e
          BRANCH="release/v$VERSION"
          git switch -c "$BRANCH"
          git add package.json package-lock.json extension/manifest.json .github/workflows/prepare-release.yml
          git commit -m "chore(release): v$VERSION"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Release v$VERSION" \
            --base main \
            --head "$BRANCH" \
            --body "$(cat <<EOF
          Bumps version to **v$VERSION**.

          When this PR is merged, the \`tag-after-merge\` workflow will tag the merge commit with \`v$VERSION\`, which triggers \`release.yml\` to build the ZIP and publish a GitHub Release.

          Manual fallback if the auto-tag workflow fails:

          \`\`\`sh
          git checkout main && git pull
          git tag v$VERSION
          git push origin v$VERSION
          \`\`\`
          EOF
          )"
