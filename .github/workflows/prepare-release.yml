name: Prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Target version (e.g., 1.2.3). Leave empty to bump patch from package.json.'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set version
        id: bump
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -e
          if [ -z "$INPUT_VERSION" ]; then
            CURRENT=$(node -p "require('./package.json').version")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "No version supplied; auto-bumped $CURRENT -> $VERSION"
          else
            VERSION="$INPUT_VERSION"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: $VERSION (expected semver like 1.2.3)"
            exit 1
          fi
          npm --no-git-tag-version --allow-same-version version "$VERSION" > /dev/null
          node scripts/sync-version.mjs
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Set to v$VERSION"

      - name: Run tests on bumped tree
        run: npm test

      - name: Open release PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -e
          BRANCH="release/v$VERSION"
          git switch -c "$BRANCH"
          git add package.json package-lock.json extension/manifest.json
          git commit -m "chore(release): v$VERSION"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Release v$VERSION" \
            --base main \
            --head "$BRANCH" \
            --body "$(cat <<EOF
          Bumps version to **v$VERSION**.

          When this PR is merged, the \`tag-after-merge\` workflow will tag the merge commit with \`v$VERSION\`, which triggers \`release.yml\` to build the ZIP and publish a GitHub Release.

          Manual fallback if the auto-tag workflow fails:

          \`\`\`sh
          git checkout main && git pull
          git tag v$VERSION
          git push origin v$VERSION
          \`\`\`
          EOF
          )"
