name: Build ZIP

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.1). Tag v$version must already exist.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -e
          VERSION="$INPUT_VERSION"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: v${{ steps.ver.outputs.version }}

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v5
        with:
          name: subtitler-${{ steps.ver.outputs.version }}
          path: dist/subtitler-${{ steps.ver.outputs.version }}.zip
          if-no-files-found: error
