name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Verify version sync
        run: |
          PKG=$(node -p "require('./package.json').version")
          MAN=$(node -p "require('./extension/manifest.json').version")
          echo "package.json=$PKG manifest.json=$MAN"
          if [ "$PKG" != "$MAN" ]; then
            echo "::error::package.json ($PKG) and extension/manifest.json ($MAN) versions disagree. Run 'node scripts/sync-version.mjs'."
            exit 1
          fi
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: subtitler-zip
          path: dist/*.zip
          retention-days: 14
