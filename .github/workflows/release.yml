name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.1). Tag v$version must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: v${{ steps.ver.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Verify version consistency
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          PKG=$(node -p "require('./package.json').version")
          MAN=$(node -p "require('./extension/manifest.json').version")
          echo "tag=v$VERSION  package.json=$PKG  manifest.json=$MAN"
          if [ "$VERSION" != "$PKG" ] || [ "$VERSION" != "$MAN" ]; then
            echo "::error::Version mismatch: tag=v$VERSION package=$PKG manifest=$MAN"
            exit 1
          fi

      - run: npm test

      - run: npm run build

      - name: Verify zip exists
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/subtitler-${{ steps.ver.outputs.version }}.zip
