name: Tag after release PR merged

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  tag:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Read version
        id: ver
        run: |
          PKG=$(node -p "require('./package.json').version")
          MAN=$(node -p "require('./extension/manifest.json').version")
          if [ "$PKG" != "$MAN" ]; then
            echo "::error::Version mismatch on main: package=$PKG manifest=$MAN"
            exit 1
          fi
          echo "version=$PKG" >> "$GITHUB_OUTPUT"

      - name: Push tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists; skipping push."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION"
          fi

      - name: Dispatch Release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # GITHUB_TOKEN-pushed tags do not trigger downstream workflows,
          # so dispatch release.yml explicitly (workflow_dispatch is exempt).
          gh workflow run release.yml -f version="$VERSION"
