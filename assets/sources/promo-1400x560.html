<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>subtitler — promo 1400x560</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #ffffff;
      }
      body {
        width: 1400px;
        height: 560px;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Arial, sans-serif;
        color: #111111;
        display: flex;
        align-items: center;
        box-sizing: border-box;
        padding: 0 80px;
      }
      .left {
        flex: 1;
        min-width: 0;
      }
      .title {
        font-size: 84px;
        font-weight: 500;
        line-height: 1;
        letter-spacing: -2px;
        margin: 0 0 20px;
      }
      .tagline {
        font-size: 24px;
        color: #444444;
        margin: 0 0 44px;
        line-height: 1.2;
      }
      .demo-en {
        font-size: 28px;
        line-height: 1.35;
        color: #111111;
        margin: 0 0 10px;
      }
      .demo-ja {
        font-size: 24px;
        line-height: 1.5;
        color: #888888;
        font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      }
      .icon {
        width: 180px;
        height: 180px;
        margin-left: 56px;
        flex-shrink: 0;
      }
      .icon img {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="left">
      <div class="title">subtitler</div>
      <div class="tagline">Japanese subtitles for English pages.</div>
      <div class="demo-en">
        Shows a Japanese translation under each English sentence. Toggle it with a shortcut — just like the line you're reading now.
      </div>
      <div class="demo-ja">
        英文の下部に日本語訳を表示します。ショートカットキーでトグルします。まさに今読んでいる文のように。
      </div>
    </div>
    <div class="icon">
      <img src="../icon.png" alt="" />
    </div>
  </body>
</html>
